<div class="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">

  <div class="flex items-center gap-2 mb-3">
    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-700 border border-blue-300">
      ContactInfoComponent
    </span>
    <span class="text-xs text-gray-500">child — always-required email field</span>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium text-gray-700" for="b-email">
      Email Address <span class="text-red-500">*</span>
    </label>
    <input
      id="b-email"
      type="email"
      [formField]="emailForm.email"
      placeholder="jane@example.com"
      class="border rounded-lg px-3 py-2 text-sm bg-white transition-colors"
      [class.border-red-400]="emailForm.email().invalid() && emailForm.email().touched()"
      [class.border-green-400]="!emailForm.email().invalid() && emailForm.email().touched()"
    />
    @if (emailForm.email().invalid() && emailForm.email().touched()) {
      <div class="flex flex-col gap-0.5 mt-0.5">
        @for (error of emailForm.email().errors(); track error.kind) {
          <span class="text-xs text-red-600">{{ error.message }}</span>
        }
      </div>
    }
  </div>

  <!-- PhoneDetailsComponent is always rendered; it decides its own validity based on the service -->
  <app-phone-details />

</div>
